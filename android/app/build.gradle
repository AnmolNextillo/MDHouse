apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

react {
    autolinkLibrariesWithApp()
}

android {
    namespace "com.mdhouseapp"

    compileSdk rootProject.ext.compileSdkVersion
    ndkVersion "26.3.11579264"     // REQUIRED for 16 KB page size support

    defaultConfig {
        applicationId "com.mdhouseapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        versionCode 13
        versionName "1.9"

        // 16KB page size FIX → ONLY arm64-v8a allowed
        ndk {
            abiFilters "arm64-v8a"
        }

        // Prevent build errors with large method count
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            shrinkResources false
            minifyEnabled false
            // enableProguardInReleaseBuilds = false
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    buildFeatures {
        prefab true
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = false
        }

        // avoid duplicate libs
        pickFirsts += [
                "lib/**/libc++_shared.so"
        ]
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // image picker
    implementation project(':react-native-image-crop-picker')

    // Firebase
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.android.gms:play-services-auth:21.2.0'

    // multidex
    implementation 'androidx.multidex:multidex:2.0.1'
}
